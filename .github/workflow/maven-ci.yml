name: Java Spring Boot CI

# Triggers the workflow on push or pull request events for the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Fetch the repository files
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up Java 17 environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # A highly reliable, open-source JDK distribution
        cache: 'maven'          # Automatically caches dependencies to speed up future runs

    # Step 3: Grant execute permission for the Maven wrapper (if present)
    # This prevents 'permission denied' errors on Linux runners
    - name: Make Maven wrapper executable
      run: chmod +x ./mvnw
      continue-on-error: true # Safe backup in case you're using global 'mvn' instead of './mvnw'

    # Step 4: Build the Spring Boot application and run tests
    - name: Build and Test with Maven
      run: ./mvnw clean verify || mvn clean verify